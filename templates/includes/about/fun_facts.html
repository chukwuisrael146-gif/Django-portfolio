<section id="fun-facts" class="relative overflow-hidden py-40">

    <!-- Background Typography -->

    <h2
        class="pointer-events-none
        absolute
        left-1/2
        top-10
        -translate-x-1/2
        text-[10rem]
        md:text-[15rem]
        font-black
        uppercase
        text-white/[0.02]">

        FACTS

    </h2>

    <div class="relative z-10 mx-auto max-w-7xl px-6">

        <!-- Heading -->

        <div class="mx-auto mb-24 max-w-3xl text-center">

            <p
                class="uppercase
                tracking-[6px]
                font-semibold
                text-orange-500">

                Chapter 05

            </p>

            <h2
                class="mt-6
                text-5xl
                lg:text-6xl
                font-black">

                Beyond The Code

            </h2>

            <p
                class="mt-8
                leading-8
                text-gray-400">

                Programming is a big part of who I am, but these are
                the little things that keep me inspired every day.

            </p>

        </div>

        <div class="grid grid-cols-12 gap-6">

            {% for fact in fun_facts %}

            <div
                class="fun-card group

                {% if fact.featured %}
                    col-span-12 lg:col-span-6 lg:row-span-2 min-h-[420px]
                {% elif forloop.counter == 2 %}
                    col-span-12 sm:col-span-6 lg:col-span-3 min-h-[200px]
                {% elif forloop.counter == 3 %}
                    col-span-12 sm:col-span-6 lg:col-span-3 min-h-[200px]
                {% elif forloop.counter == 4 %}
                    col-span-12 lg:col-span-4 min-h-[220px]
                {% elif forloop.counter == 5 %}
                    col-span-12 lg:col-span-4 min-h-[220px]
                {% else %}
                    col-span-12 lg:col-span-4 min-h-[220px]
                {% endif %}">

                <!-- Glow -->

                <div class="fun-glow"></div>

                <!-- Number -->

                <span
                    class="absolute
                    right-6
                    top-4
                    text-7xl
                    font-black
                    text-white/[0.04]">

                    {{ forloop.counter|stringformat:"02d" }}

                </span>

                <div class="relative z-10 flex h-full flex-col justify-between">

                    <div>

                        <div
                            class="icon-box
                            mb-8
                            flex
                            h-16
                            w-16
                            items-center
                            justify-center
                            rounded-2xl
                            bg-orange-500/10">

                            <i class="{{ fact.icon }} text-3xl text-orange-400"></i>

                        </div>

                        <h3 class="text-3xl font-bold">

                            {{ fact.title }}

                        </h3>

                        <p
                            class="mt-6
                            leading-8
                            text-gray-400">

                            {{ fact.description }}

                        </p>

                    </div>

                    <div
                        class="mt-10
                        flex
                        items-center
                        justify-between">

                        <span
                            class="rounded-full
                            border
                            border-orange-500/20
                            bg-orange-500/10
                            px-4
                            py-2
                            text-xs
                            uppercase
                            tracking-[0.35em]
                            text-orange-400">

                            Fun Fact

                        </span>

                        <i
                            class="fa-solid
                            fa-arrow-right
                            text-gray-500
                            transition
                            duration-500
                            group-hover:translate-x-2
                            group-hover:text-orange-400">
                        </i>

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</section>
