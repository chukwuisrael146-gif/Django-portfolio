<div class="timeline-item relative mb-20 pl-12 lg:mb-32 lg:w-[46%] lg:pl-0 {% if side == 'right' %}lg:self-end lg:ml-auto{% endif %}">

    <!-- Card -->

    <div class="w-full">

        <div
            class="glass-card rounded-3xl p-7 transition-all duration-500 hover:-translate-y-2 hover:border-orange-500/40 lg:p-8">

            <div class="flex items-center gap-4">

                <div
                    class="flex h-12 w-12 items-center justify-center rounded-full bg-orange-500/10 text-orange-400">

                    <i class="{{ icon }}"></i>

                </div>

                <span class="text-orange-400 font-semibold">

                    {{ year }}

                </span>

            </div>

            <h3 class="mt-6 text-2xl font-bold">

                {{ title }}

            </h3>

            <p class="mt-4 leading-8 text-gray-400">

                {{ description }}

            </p>

            <span
                class="mt-6 inline-block rounded-full border border-orange-500/20 bg-orange-500/10 px-4 py-2 text-sm text-orange-300">

                {{ tech }}

            </span>

        </div>

    </div>

    <!-- Dot -->

    <div
        class="dot absolute left-[18px] top-8 z-20 h-5 w-5 -translate-x-1/2 rounded-full border-4 border-[#17181c] bg-white lg:left-[-10px]">
    </div>

</div>
