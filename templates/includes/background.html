<!-- Background Video -->
<div
    id="hero-video-wrapper"
    class="fixed inset-0 z-0 overflow-hidden pointer-events-none">

    <video
        id="hero-video"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        class="absolute inset-0 h-full w-full object-cover opacity-0">

        <source
            src="{% static 'videos/hero.mp4' %}"
            type="video/mp4">

    </video>

    <!-- Dark Overlay -->
    <div
        class="absolute inset-0 bg-black/55">
    </div>

    <!-- Gradient -->
    <div
        class="absolute inset-0 bg-gradient-to-b
        from-[#17181c]/20
        via-[#17181c]/45
        to-[#17181c]">
    </div>

    <!-- Noise -->
    <div class="noise absolute inset-0 opacity-10"></div>

</div>
